<div class="especificacion-form mb-2 border border-light p-2 rounded">
    <div class="row">
        {{ form.id }}
        {{ form.seccion }}
        
        <div class="col-md-1">
            <div class="mb-2">
                <label for="{{ form.orden.id_for_label }}" class="form-label small">Orden</label>
                {{ form.orden }}
            </div>
        </div>
        
        <div class="col-md-5">
            <div class="mb-2">
                <label for="{{ form.nombre.id_for_label }}" class="form-label small">Especificación</label>
                {{ form.nombre }}
            </div>
        </div>
        
        <div class="col-md-3">
            <div class="mb-2">
                <label for="{{ form.tipoDato.id_for_label }}" class="form-label small">Tipo de Dato</label>
                {{ form.tipoDato }}
            </div>
        </div>
        
        <div class="col-md-2">
            <div class="mb-2">
                <label for="{{ form.unidadMedida.id_for_label }}" class="form-label small">Unidad</label>
                {{ form.unidadMedida }}
            </div>
        </div>
        
        <div class="col-md-1">
            <div class="mb-2 mt-4">
                <button type="button" class="btn btn-danger btn-sm remove-especificacion">
                    <i class="bi bi-trash"></i>
                </button>
            </div>
        </div>
    </div>
</div>
