<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Tipos de Equipos</title>
    
    <!-- CSS de Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.11.5/css/jquery.dataTables.min.css">

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.11.5/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

    <div class="container mt-4">
        <h2>Gestión tipos de equipos</h2><br>
        

        <h4>Crear tipo de equipo</h4>
        <!-- Formulario para agregar un tipo de equipo -->
        <form method="post" id="form-add">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">Guardar</button>
        </form><br>

        <hr>

        <!-- Tabla con los tipos de equipos -->
        <table id="equiposTable" class="display table table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Prefijo</th>
                    <th>Tipo de equipo</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                {% for equipo in equipos %}
                <tr>
                    <td>{{ equipo.id }}</td>
                    <td>{{ equipo.prefixeq }}</td>
                    <td>{{ equipo.tipoeq }}</td>
                    <td>
                        <button class="btn btn-warning btn-sm edit-btn" data-id="{{ equipo.id }}" data-prefix="{{ equipo.prefixeq }}" data-tipo="{{ equipo.tipoeq }}" data-bs-toggle="modal" data-bs-target="#editModal">Editar</button>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <!-- Modal para Editar -->
    <div class="modal fade" id="editModal" tabindex="-1" aria-labelledby="editModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="editModalLabel">Editar Tipo de Equipo</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>
                <div class="modal-body">
                    <!-- Div para mostrar el mensaje de éxito o error -->
                    <div id="edit-message" style="display: none; padding: 10px; margin-bottom: 10px; border-radius: 5px;"></div>

                    <!-- Formulario de edición -->
                    <form id="form-edit">
                        {% csrf_token %}
                        <input type="hidden" id="edit-id">
                        <div class="mb-3">
                            <label for="edit-prefixeq" class="form-label">Prefijo</label>
                            <input type="text" class="form-control" id="edit-prefixeq">
                        </div>
                        <div class="mb-3">
                            <label for="edit-tipoeq" class="form-label">Tipo de equipo</label>
                            <input type="text" class="form-control" id="edit-tipoeq">
                        </div>
                        <button type="submit" class="btn btn-primary">Guardar Cambios</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        $(document).ready(function () {
            $('#equiposTable').DataTable();

            // Cuando se haga clic en "Editar", llenar el modal con los datos
            $(".edit-btn").click(function () {
                $("#edit-id").val($(this).data("id"));
                $("#edit-prefixeq").val($(this).data("prefix"));
                $("#edit-tipoeq").val($(this).data("tipo"));
            });

            // Enviar formulario de edición con AJAX
            $("#form-edit").submit(function (e) {
                e.preventDefault();
                let id = $("#edit-id").val();
                let prefixeq = $("#edit-prefixeq").val();
                let tipoeq = $("#edit-tipoeq").val();
                let csrf_token = $("input[name=csrfmiddlewaretoken]").val();

                $.ajax({
                    url: `${id}/editar/`,  // URL para la edición del tipo de equipo
                    type: "POST",
                    data: {
                        csrfmiddlewaretoken: csrf_token,
                        prefixeq: prefixeq,
                        tipoeq: tipoeq
                    },
                    success: function (response) {
                        // Mostrar mensaje de éxito
                        $("#edit-message").text("¡Registro actualizado correctamente!").css({
                            "display": "block",
                            "background-color": "green",
                            "color": "white",
                            "text-align": "center"
                        });

                        // Recargar la página para ver los cambios
                        setTimeout(function() {
                            location.reload();
                        }, 850);
                    },
                    error: function (error) {
                        // Mostrar mensaje de error
                        $("#edit-message").text("Error al actualizar.").css({
                            "display": "block",
                            "background-color": "red",
                            "color": "white",
                            "text-align": "center"
                        });
                    }
                });
            });
        });
    </script>
</body>
</html>
